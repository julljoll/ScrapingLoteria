<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap" rel="stylesheet">
  <title>Datos de Animalitos Hoy | Pronósticos LotoDía</title>
  <meta name="description" content="Pronósticos y datos de animalitos para Lotto Activo y La Granjita. Imágenes actualizadas diariamente.">
  
  <style>
    .datos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    .card-dato {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 0; /* Para que la imagen luzca mejor */
      overflow: hidden;
      text-align: center;
      transition: 0.3s;
    }
    .card-dato:hover { border-color: var(--accent); transform: scale(1.02); }
    
    .card-dato img {
      width: 100%;
      height: auto;
      display: block;
      border-bottom: 1px solid var(--line);
    }
    .card-dato-info { padding: 15px; }
    .card-dato h4 { 
        margin: 0; 
        color: var(--accent); 
        font-family: var(--font-display); 
        font-size: 1.2rem;
    }
    .card-dato p { color: var(--muted); font-size: 0.9rem; margin: 5px 0 0; }

    .card-dato img {
      width: 100%;
      height: 200px; /* Altura fija para mantener simetría */
      object-fit: cover; /* Ajusta la imagen sin deformarla */
      display: block;
      background: #1a2233; /* Color de fondo mientras carga */
    }
    
    .status {
      grid-column: 1 / -1;
      text-align: center;
      padding: 40px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-inner">
        <div class="brand">
            <a href="/" style="display: flex; align-items:center; gap:10px;">
                <div class="logo"><img src="logo.svg" alt="LotoDía" class="logo-img"></div>
                <h1 class="brand-title"><span class="brand-word">LOTO</span> <span class="brand-accent">DÍA</span></h1>
            </a>
        </div>
    </div>
  </div>

  <div class="wrap">
    <section class="hero">
      <h2>Datos y Pronósticos</h2>
      <p>Análisis diario de los animales con más probabilidades para hoy.</p>
    </section>

    <div class="section-title">
        <h3>Pronósticos del Día</h3>
    </div>

    <div id="datos-container" class="datos-grid">
        <div class="status">Cargando pronósticos de hoy...</div>
    </div>

    <footer>
      <span>© 2026 LotoDía - Pronósticos de Lotería</span>
    </footer>
  </div>

  <script>
    const DATOS_CSV ="https://docs.google.com/spreadsheets/d/e/2PACX-1vRy8_sTXB8AQ9BwHR_G1ZQPaoBZ-woa4I1XdCZLapf4HsyQaubride3npFnXhDN_P85dizphkccFcfh/pub?gid=1859691677&single=true&output=csv";

    async function loadDatos() {
        const container = document.getElementById('datos-container');
        try {
            const res = await fetch(DATOS_CSV + "&cachebuster=" + new Date().getTime()); // Evita caché antigua
            const text = await res.text();
            
            // Dividir por líneas y filtrar las que estén vacías
            const rows = text.split('\n').filter(line => line.trim() !== '').slice(1);

            if (rows.length === 0) {
                container.innerHTML = '<div class="status">No hay datos disponibles por ahora.</div>';
                return;
            }

            container.innerHTML = rows.map(row => {
                // Regex para manejar comas dentro de comillas si las hubiera
                const cols = row.split(/,(?=(?:(?:[^\"]*\"){2})*[^\"]*$)/); 
                
                // Mapeo según tu captura:
                const juego = (cols[3] || "Sorteo").replace(/\"/g, "");
                const animal = (cols[5] || "").replace(/\"/g, "");
                const imgUrl = (cols[6] || "").trim().replace(/\"/g, "");

                if (!imgUrl && !animal) return ''; // Salta filas vacías

                return `
                    <div class="card-dato">
                        ${imgUrl ? `<img src="${imgUrl}" alt="Dato para ${juego}" onerror="this.style.display='none'">` : ''}
                        <div class="card-dato-info">
                            <h4>${juego}</h4>
                            <p>${animal.toUpperCase()}</p>
                        </div>
                    </div>
                `;
            }).join('');
        } catch (e) {
            container.innerHTML = '<p class="error">Error al conectar con los resultados.</p>';
            console.error("Error cargando CSV:", e);
        }
    }
    loadDatos();
  </script>
</body>
</html>
